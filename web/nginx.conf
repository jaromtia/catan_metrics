server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: let the React router handle unknown client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST + WebSocket traffic to the backend. The `api` host resolves
    # via the docker-compose network. Upgrade headers keep the live game
    # WebSocket (/api/games/{id}/ws) working.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
